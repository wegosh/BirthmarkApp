<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Page Not Found • Birthmark</title>

    <link rel="icon" type="image/png" href="/assets/favicon-96x96.png">
    <link rel="stylesheet" href="/styles.css">

    <style>
        .not-found-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .not-found-card {
            max-width: 600px;
            text-align: center;
        }

        .not-found-code {
            font-size: clamp(90px, 20vw, 180px);
            font-weight: 800;
            line-height: 1;
            margin: 0;
            color: var(--accent-color);
            text-shadow: 0 20px 40px rgba(255, 146, 0, 0.25);
        }

        .not-found-title {
            margin-top: 20px;
            font-size: clamp(32px, 5vw, 48px);
        }

        .not-found-description {
            margin: 24px auto 40px;
            max-width: 500px;
            color: var(--muted-text-color);
            font-size: 18px;
            line-height: 1.7;
        }

        .not-found-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .secondary-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 56px;
            padding: 0 28px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 700;
            color: white;
            border: 1px solid var(--border-color);
            background: rgba(255,255,255,0.05);
            transition: 180ms ease;
        }

        .secondary-button:hover {
            background: rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>
    <main class="not-found-page">
        <div class="not-found-card">

            <img
                src="/assets/logo.png"
                alt="Birthmark logo"
                width="100"
                height="100"
            >

            <h1 class="not-found-code">404</h1>

            <h2 class="not-found-title">
                Oops, this page doesn't exist.
            </h2>

            <p class="not-found-description">
                Looks like you've followed an old or incorrect link.
                Let's get you back to celebrating birthdays, anniversaries,
                and special moments.
            </p>

            <div class="not-found-buttons">
                <a class="app-store-button" href="/">
                    Go Home
                </a>

                <a class="secondary-button"
                   href="https://apps.apple.com/us/app/birthmark/id6775931580">
                    Download the App
                </a>
            </div>

        </div>
    </main>
</body>
</html>
